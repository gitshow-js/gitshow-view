<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GitShow</title>
</head>
<body id="gitshow-main">
    <div id="gitshow-welcome">
        <main>
            <div class="loader"></div>
            <div id="gitshow-message"></div>
            <h1>GitShow</h1>
            <p><a href="https://github.com/radkovo/gitshow">https://github.com/gitshow-js/gitshow</a></p>
            <div class="show">
                <div id="gitshow-show1">
                    <button type="button" id="gitshow-show">Open a presentation</button>
                </div>
                <div id="gitshow-show2" style="display: none;">
                    <form onsubmit="return false">
                        <label for="gitshow-url">Please enter the GitHub URL or a generic URL of the presentation</label><br>
                        <input type="text" id="gitshow-url" size="40"><br>
                        <p id="gitshow-desturl"></p>
                        <p id="gitshow-checkstatus"></p>
                        <button type="button" id="gitshow-run" style="display: none;">Show</button>
                    </form>
                </div>
                <p>How to <a href="https://github.com/gitshow-js/gitshow-view#readme" target="_blank">create a presentation</a>?</p>
            </div>
        </main>
    </div>
    <div id="gh-auth-widget" data-persistent>
        <button id="gh-auth-icon" title="GitHub">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
        </button>
        <div id="gh-auth-popup">
            <p id="gh-auth-status"></p>
            <button id="gh-login-btn">Login with GitHub</button>
            <button id="gh-logout-btn">Logout</button>
        </div>
    </div>
    <script type="module" src="/main.ts"></script>
</body>
</html>
